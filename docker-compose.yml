services:
  db:
    image: postgis/postgis:16-3.4
    container_name: transporte_postgis
    environment:
      POSTGRES_DB: transporte
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
