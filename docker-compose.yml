version: "3.9"

services:
  django:
    build: .
    container_name: transporte_django
    env_file:
      - .env
    ports:
      - "8000:8000"

    # importante para hot reload em dev
    volumes:
      - .:/app

    restart: unless-stopped

    command: >
      sh -c "
      python monolito/manage.py migrate &&
      gunicorn
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
      --chdir monolito
      sistema_fretamento.wsgi:application
      "
